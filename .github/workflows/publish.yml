name: Compilar Plugin PKHeX

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar Dependências
        run: dotnet restore src/Home-Tracking-Scan.csproj

      - name: Build do Plugin
        run: dotnet build src/Home-Tracking-Scan.csproj -c Release

      - name: Criar Zip do Plugin
        run: |
          mkdir ./publish
          cp src/bin/Release/net9.0-windows/Home-Tracking-Scan.dll ./publish/
          cd publish
          zip -r ../Home-Tracking-Scan_Plugin.zip ./*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Home-Tracking-Scan_Plugin.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
